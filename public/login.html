<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme | Login</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700;1,800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="assets/style.css">
</head>

<body class="login-page">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="https://supreme-cheats.xyz/forum/styles/evolve-dark/images/logo.png" alt="Supreme Logo" class="login-icon">
                <p class="login-subtitle">Verify your identity to continue</p>
            </div>

            <form id="login-form">
                <div class="auth-form-group">
                    <label class="auth-label" for="code">Authenticator Code</label>
                    <input type="text" id="code" class="auth-control" placeholder="000000" pattern="\d*" maxlength="6"
                        autocomplete="one-time-code" required autofocus
                        style="text-align: center; font-size: 1.8rem; letter-spacing: 0.5rem; font-family: 'Outfit', sans-serif;">
                </div>

                <div id="login-error" class="auth-error"></div>

                <button type="submit" class="auth-btn-primary">
                    <i class="ph ph-shield-check"></i> Authenticate
                </button>
            </form>
        </div>
    </div>

    <script src="assets/auth.js"></script>
</body>

</html>
