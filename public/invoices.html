<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme | Invoices</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="ph-fill ph-wallet"></i>
                <span>Supreme Wallet</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item" data-tooltip="Overview"><i class="ph ph-squares-four"></i>
                    <span>Overview</span></a>
                <a href="transactions.html" class="nav-item" data-tooltip="Transactions"><i
                        class="ph ph-arrows-left-right"></i> <span>Transactions</span></a>
                <a href="customers.html" class="nav-item" data-tooltip="Customers"><i class="ph ph-users"></i>
                    <span>Customers</span></a>
                <a href="subscriptions.html" class="nav-item" data-tooltip="Subscriptions"><i class="ph ph-repeat"></i>
                    <span>Subscriptions</span></a>
                <a href="invoices.html" class="nav-item active" data-tooltip="Invoices"><i class="ph ph-receipt"></i>
                    <span>Invoices</span></a>
                <a href="balance.html" class="nav-item" data-tooltip="Balance & Payouts"><i class="ph ph-scales"></i>
                    <span>Balance & Payouts</span></a>
                <a href="refunds.html" class="nav-item" data-tooltip="Refunds"><i class="ph ph-arrow-u-down-left"></i>
                    <span>Refunds</span></a>
                <a href="disputes.html" class="nav-item" data-tooltip="Disputes"><i class="ph ph-warning-octagon"></i>
                    <span>Disputes</span></a>
                <a href="events.html" class="nav-item" data-tooltip="Stripe Events"><i class="ph ph-bell-ringing"></i>
                    <span>Stripe Events</span></a>
                <a href="analytics.html" class="nav-item" data-tooltip="Analytics"><i class="ph ph-chart-line-up"></i>
                    <span>Analytics</span></a>
                <a href="ledger.html" class="nav-item" data-tooltip="Mini Ledger"><i class="ph ph-book-open"></i>
                    <span>Mini Ledger</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="settings.html" class="nav-item" data-tooltip="Settings"><i class="ph ph-gear"></i>
                    <span>Settings</span></a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button id="sidebar-toggle" class="btn-icon" style="display: none;"><i
                            class="ph ph-list"></i></button>
                    <!-- Show desktop collapse button via CSS media query, hidden on mobile -->
                    <button id="mobile-menu-btn" class="btn-icon" style="display: none;"><i
                            class="ph ph-list"></i></button>
                    <button id="desktop-sidebar-btn" class="btn-icon" onclick="App.toggleSidebar()"><i
                            class="ph ph-list"></i></button>

                    <div class="global-search">
                        <i class="ph ph-magnifying-glass text-muted"></i>
                        <input type="text" placeholder="Search transactions, customers...">
                    </div>
                </div>
                <div class="topbar-right">
                    <span class="badge badge-warning" id="stripe-mode-badge"
                        style="font-size: 0.7rem; padding: 2px 8px;">Test Mode</span>
                    <button class="btn-icon" title="Notifications"><i class="ph ph-bell"></i></button>
                    <button id="theme-toggle" class="btn-icon" title="Toggle Theme"><i class="ph ph-moon"></i></button>
                    <div style="height: 32px; width: 1px; background: var(--border-color); margin: 0 8px;"></div>
                    <div style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                        <div class="avatar avatar-sm">A</div>
                        <div style="display: flex; flex-direction: column;">
                            <span id="user-name-display" style="font-size: 0.85rem; font-weight: 600;">Admin</span>
                            <span class="text-muted" style="font-size: 0.75rem;">Owner</span>
                        </div>
                        <i class="ph ph-caret-down text-muted" style="margin-left: 8px;"></i>
                    </div>
                    <button id="logout-btn" class="btn-icon text-muted" title="Logout" style="margin-left: 10px;"><i
                            class="ph ph-sign-out"></i></button>
                </div>
            </header>

            <div class="content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Invoices</h1>
                        <p class="page-subtitle">Track billing records and receipts.</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-header" style="flex-wrap: wrap; gap: 16px;">
                        <div style="display: flex; gap: 12px; flex-wrap: wrap; flex: 1;">
                            <div style="position: relative; max-width: 300px; flex: 1;">
                                <i class="ph ph-magnifying-glass text-muted"
                                    style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%);"></i>
                                <input type="text" id="search-input" class="form-control"
                                    placeholder="Search invoices..." style="padding-left: 36px;">
                            </div>
                            <select id="status-filter" class="form-control" style="width: 160px;">
                                <option value="">All Statuses</option>
                                <option value="paid">Paid</option>
                                <option value="open">Open</option>
                                <option value="draft">Draft</option>
                                <option value="uncollectible">Uncollectible</option>
                                <option value="void">Void</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Invoice #</th>
                                    <th>Customer Email</th>
                                    <th>Amount Due</th>
                                    <th>Status</th>
                                    <th>PDF</th>
                                </tr>
                            </thead>
                            <tbody id="invoices-tbody">
                                <tr>
                                    <td colspan="5">
                                        <div class="skeleton skeleton-text" style="height: 40px; margin: 10px 0;"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/app.js"></script>
    <script src="assets/invoices.js"></script>
</body>

</html>
