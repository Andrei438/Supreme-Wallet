# =========================================================================
# Supreme Wallet - Dokploy Compose
# Subdomain: wallet.supreme-cheats.xyz
# Database: Encrypted JSON files (persistent volume)
# =========================================================================

services:
  supreme-wallet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supreme-wallet
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - REDIS_URL=redis://wallet-redis:6379
    volumes:
      - WalletData:/app/data
    depends_on:
      wallet-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.supreme-wallet.rule=Host(`wallet.supreme-cheats.xyz`)"
      - "traefik.http.routers.supreme-wallet.entrypoints=websecure"
      - "traefik.http.routers.supreme-wallet.tls.certresolver=letsencrypt"
      - "traefik.http.services.supreme-wallet.loadbalancer.server.port=3000"
    networks:
      - dokploy-network

  wallet-redis:
    image: "redis:7-alpine"
    container_name: supreme-wallet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - dokploy-network

volumes:
  WalletData:
    driver: local

networks:
  dokploy-network:
    external: true
